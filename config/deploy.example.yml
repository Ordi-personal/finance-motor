# Template para deploy com Kamal (copie para config/deploy.yml e preencha)
# Nunca commite deploy.yml com IPs, domínios ou credenciais reais.

service: finance-motor
image: ghcr.io/SEU_USUARIO/finance-motor

servers:
  web:
    hosts:
      - SEU_IP_OU_HOST
    options:
      network-alias: finance-motor-web
    labels:
      kamal-proxy.host: finance.seudominio.com
      kamal-proxy.ssl: "true"
      kamal-proxy.app_port: 4000
  job:
    hosts:
      - SEU_IP_OU_HOST
    cmd: bundle exec sidekiq

registry:
  server: ghcr.io
  username: SEU_USUARIO_GITHUB
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - SECRET_KEY_BASE
    - ORDI_SHARED_SECRET
    - SSO_SECRET_KEY
    - SIDEKIQ_WEB_USERNAME
    - SIDEKIQ_WEB_PASSWORD
  clear:
    PORT: 4000
    APP_DOMAIN: finance.seudominio.com
    APP_URL: https://finance.seudominio.com
    BRAND_NAME: "Nome da Marca"
    PRODUCT_NAME: "Nome do Produto"
    SELF_HOSTED: true
    ONBOARDING_STATE: closed
    ENABLE_FRAME_ANCESTORS: true
    HTTP_ALLOWED_HOSTS: https://finance.seudominio.com,https://finance.antigo-seudominio.com
    FRAME_ANCESTORS_HOSTS: https://app.seudominio.com,https://admin.seudominio.com
    RAILS_SERVE_STATIC_FILES: true
    RAILS_ASSUME_SSL: true

proxy:
  ssl: true
  host: finance.seudominio.com
  app_port: 4000
  healthcheck:
    path: /up
    interval: 10

builder:
  arch: amd64
  args:
    RUBY_VERSION: 3.4.2
